services:
    postgresdb:
        image: postgres:17-alpine
        container_name: stokku-db
        restart: unless-stopped
        env_file: .env
        environment:
            - POSTGRES_USER=$DB_USER
            - POSTGRES_PASSWORD=$DB_PASS
            - POSTGRES_DB=$DB_NAME
        ports:
            - "$DB_PORT:$DB_PORT"
        volumes:
            - stokku-volume:/var/lib/postgresql/data
            - ./sql:/docker-entrypoint-initdb.d
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 30s

volumes:
    stokku-volume:
        name: stokku-volume
